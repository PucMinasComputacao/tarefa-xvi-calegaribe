<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meus Favoritos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<script src="assets/js/login.js"></script>
</head>

<body>

<div class="container py-5">

    <h1 class="mb-4">
        Meus Favoritos
    </h1>

    <div class="row" id="favoritos-container"></div>

</div>

<script>

const usuario =
JSON.parse(
    sessionStorage.getItem("usuarioCorrente")
);

if (!usuario) {

    window.location.href =
        "./modulos/login/index.html";
}

const favoritos =
JSON.parse(
    localStorage.getItem(
        `favoritos_${usuario.id}`
    )
) || [];

const container =
document.getElementById(
    "favoritos-container"
);

const lugaresFavoritos =
dadosGlobais.lugares.filter(
    lugar =>
    favoritos.includes(lugar.id)
);

if (
    lugaresFavoritos.length === 0
) {

    container.innerHTML =
    `
    <p>Nenhum favorito salvo.</p>
    `;

} else {

    lugaresFavoritos.forEach(
        lugar => {

            container.innerHTML += `
            <div class="col-md-4 mb-4">

                <div class="card">

                    <img
                    src="${lugar.imagem_principal}"
                    class="card-img-top">

                    <div class="card-body">

                        <h5>
                            ${lugar.nome}
                        </h5>

                        <a
                        href="detalhes.html#${lugar.id}"
                        class="btn btn-primary">

                        Ver detalhes

                        </a>

                    </div>

                </div>

            </div>
            `;
        }
    );
}

</script>

</body>
</html>
