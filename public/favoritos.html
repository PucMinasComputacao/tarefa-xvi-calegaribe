<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meus Favoritos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<script src="assets/modulos/login/login.js"></script>
</head>

<body>

<div class="container py-5">

    <h1 class="mb-4">
        Meus Favoritos
    </h1>

    <div class="row" id="favoritos-container"></div>

</div>

<script>
const API_URL = "http://localhost:3000/lugares";

const usuario = JSON.parse(sessionStorage.getItem("usuarioCorrente"));

if (!usuario) {
    window.location.href = "assets/modulos/login/index.html";
} else {
    carregarFavoritos();
}

async function carregarFavoritos() {
    const resposta = await fetch(API_URL);
    const lugares = await resposta.json();

    const favoritos = JSON.parse(localStorage.getItem(`favoritos_${usuario.id}`)) || [];
    const lugaresFavoritos = lugares.filter(lugar => favoritos.includes(lugar.id));

    const container = document.getElementById("favoritos-container");

    if (lugaresFavoritos.length === 0) {
        container.innerHTML = `<p>Nenhum favorito salvo.</p>`;
        return;
    }

    lugaresFavoritos.forEach(lugar => {
        container.innerHTML += `
            <div class="col-md-4 mb-4">
                <div class="card">
                    <img src="${lugar.imagem_principal}" class="card-img-top">
                    <div class="card-body">
                        <h5>${lugar.nome}</h5>
                        <a href="detalhes.html#${lugar.id}" class="btn btn-primary">Ver detalhes</a>
                    </div>
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
