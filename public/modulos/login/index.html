<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2>Login</h2>

    <div class="mb-3">
        <label>Usuário</label>

        <input
            type="text"
            id="login"
            class="form-control">
    </div>

    <div class="mb-3">
        <label>Senha</label>

        <input
            type="password"
            id="senha"
            class="form-control">
    </div>

    <button
        id="btnLogin"
        class="btn btn-primary">
        Entrar
    </button>

</div>

<script src="./login.js"></script>

</body>
</html>
